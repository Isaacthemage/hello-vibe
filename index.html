<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hello Vibe Coding</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #f0f4ff 0%, #e8f0fe 50%, #f5f0ff 100%);
      color: #1a1a2e;
      line-height: 1.6;
      padding: 2rem;
    }

    .page {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      width: 100%;
      max-width: 560px;
    }

    .page > main,
    .page > section {
      text-align: center;
      background: rgba(255, 255, 255, 0.85);
      backdrop-filter: blur(12px);
      border-radius: 1.25rem;
      padding: 3rem 2.5rem;
      box-shadow:
        0 4px 24px rgba(0, 0, 0, 0.06),
        0 1px 3px rgba(0, 0, 0, 0.04);
    }

    .badge {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: #4f46e5;
      background: rgba(79, 70, 229, 0.1);
      border-radius: 999px;
      padding: 0.35rem 0.75rem;
      margin-bottom: 1rem;
    }

    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    h2 {
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #4f46e5, #7c3aed);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    p {
      font-size: 1.125rem;
      color: #4b5563;
      margin-bottom: 2rem;
    }

    ul {
      list-style: none;
      text-align: left;
    }

    li {
      font-size: 1.125rem;
      color: #4b5563;
      padding: 0.625rem 0;
      padding-left: 1.5rem;
      position: relative;
      border-bottom: 1px solid rgba(0, 0, 0, 0.06);
    }

    li:last-child {
      border-bottom: none;
    }

    li::before {
      content: "";
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #6366f1;
    }

    button {
      display: inline-block;
      font-family: inherit;
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      background: linear-gradient(135deg, #4f46e5, #6366f1);
      border: none;
      border-radius: 0.625rem;
      padding: 0.875rem 2rem;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 14px rgba(79, 70, 229, 0.35);
    }

    button:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(79, 70, 229, 0.45);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="page">
    <main>
      <span class="badge">Project 001 · Live</span>
      <h1>Hello Vibe Coding</h1>
      <p>This is my first Cursor project — a simple page to kick off my vibe coding journey.</p>
      <button type="button">I built this</button>
    </main>

    <section>
      <h2>What I learned</h2>
      <ul>
        <li>How to use Cursor Agent</li>
        <li>How to track changes with Git</li>
        <li>How to push a project to GitHub</li>
      </ul>
    </section>
  </div>
</body>
</html>
